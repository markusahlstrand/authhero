# This workflow will do a clean install of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Unit tests

on: pull_request

jobs:
  node-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN }}

      # Restore TypeScript's incremental output (`.tsbuildinfo`) and the
      # `dist/types/` per-file `.d.ts` tree that `rollup-plugin-dts` bundles.
      # On a cache hit, `tsc -p tsconfig.types.json` skips type-checking and
      # re-emit for unchanged files, dropping authhero's cold build from
      # ~21 s to ~11 s. Cache must include both: tsbuildinfo alone gives no
      # speedup because tsc still re-emits when the `.d.ts` files are absent.
      - name: Restore TypeScript build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/*/tsconfig.tsbuildinfo
            packages/authhero/dist/tsconfig.types.tsbuildinfo
            packages/authhero/dist/types
          key: ${{ runner.os }}-ts-${{ hashFiles('packages/*/tsconfig*.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ts-${{ hashFiles('packages/*/tsconfig*.json', 'pnpm-lock.yaml') }}-
            ${{ runner.os }}-ts-

      - name: Build packages
        # pnpm -r builds in topological dependency order, so each package's
        # dist/*.d.ts exist before dependents type-check against them. Covers
        # interfaces, saml, proxy, kysely, widget, authhero, drizzle,
        # multi-tenancy, cloudflare, aws and create-authhero.
        run: pnpm -r --filter './packages/**' build

      - name: Build admin
        run: pnpm admin build

      # Smoke-test the Cloudflare Workers deployment path: scaffold a fresh
      # multi-tenant project via create-authhero, then run `wrangler deploy
      # --dry-run` against it. Catches drift between published packages
      # (drizzle adapter, widget, admin, authhero core) before users hit it.
      - name: Scaffold cloudflare worker
        working-directory: apps
        run: |
          node ../packages/create-authhero/index.js worker-smoke \
            --template=cloudflare \
            --workspace --multi-tenant --admin-ui \
            --skip-install --skip-migrate --skip-start --yes

      - name: Link workspace deps for scaffolded worker
        run: pnpm install --no-frozen-lockfile

      - name: Validate worker bundles
        working-directory: apps/worker-smoke
        run: pnpm exec wrangler deploy --dry-run --outdir=/tmp/worker-out

      # Smoke-test the WFP dispatcher template (#902) — scaffold the
      # dispatcher worker and dry-run deploy. The dispatcher only depends on
      # @authhero/proxy and @authhero/drizzle, both already built above.
      - name: Scaffold WFP dispatcher
        working-directory: apps
        run: |
          node ../packages/create-authhero/index.js wfp-dispatcher-smoke \
            --template=cloudflare-wfp-dispatcher \
            --workspace \
            --skip-install --skip-migrate --skip-start --yes

      - name: Link workspace deps for WFP dispatcher
        run: pnpm install --no-frozen-lockfile

      - name: Validate WFP dispatcher bundles
        working-directory: apps/wfp-dispatcher-smoke
        run: pnpm exec wrangler deploy --dry-run --outdir=/tmp/wfp-out

      - name: Run tests
        run: pnpm -r test
