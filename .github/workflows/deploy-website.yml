name: Deploy website

on:
  push:
    branches: [main]
    paths:
      - "apps/website/**"
      - ".github/workflows/deploy-website.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Guard against workflow_dispatch from non-main refs publishing unmerged
    # changes to the production --branch=main Pages deployment.
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --filter @authhero/website... --frozen-lockfile

      - name: Build website
        run: pnpm --filter @authhero/website build

      # Run from apps/website so wrangler picks up the functions/ directory
      # (the early-access Pages Function) alongside the dist output.
      - name: Deploy to Cloudflare Pages
        working-directory: apps/website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy dist --project-name=authhero-website --branch=main
