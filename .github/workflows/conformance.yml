name: OIDC Conformance

# Runs on manual dispatch, and automatically on the changesets release PR
# (changeset-release/main) where it is a required check — packages must pass
# the conformance suite before a version-bump PR can merge. The pull_request
# trigger fires on every PR so the required check is always reported, but the
# job itself is skipped (= satisfied) unless the head is the release branch.
#
# Builds the OpenID Foundation conformance suite (cached Maven artifact),
# generates a fresh auth-server, and runs the conformance runner.
# ~10–20 min on cold cache, ~5–8 min when the suite JAR cache hits.
on:
  pull_request:
    branches:
      - main
    # "edited" (non-default) covers stacked PRs: when a parent PR merges and
    # GitHub auto-retargets the child to main, no opened/synchronize event
    # fires — without it the required conformance check is never reported and
    # the PR is stuck on "Expected". Title/body edits also fire it, but those
    # runs skip in seconds (non-release PRs) or dedupe via the per-SHA
    # concurrency group below.
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:
    inputs:
      grep:
        description: "Playwright --grep filter (e.g. oidcc-server). Empty runs the full plan."
        required: false
        default: ""
      allow_warning:
        description: "Treat WARNING results as pass"
        required: false
        type: boolean
        default: true
      workers:
        description: "Playwright workers (parallel plans, max 4). Empty uses the CI default."
        required: false
        default: ""

# The release workflow force-pushes changeset-release/main on every main
# merge, and runs can sit in "action_required" until manually approved — so
# several runs for the same branch can start close together, out of commit
# order. Scope the group per-SHA so a (re-)run of a stale commit can never
# cancel the run for the current branch head; stale runs instead cancel
# themselves in the "Cancel superseded run" step below.
concurrency:
  group: conformance-${{ github.event_name == 'pull_request' && format('{0}-{1}', github.head_ref, github.event.pull_request.head.sha) || github.run_id }}
  cancel-in-progress: true

# actions: write lets a superseded run cancel itself via `gh run cancel`.
permissions:
  contents: read
  actions: write

jobs:
  # Cheap gate (~15s): hash the inputs that influence the conformance result
  # and look for a marker cached by a previous successful full run of the
  # same code. The release workflow force-pushes changeset-release/main on
  # every main merge, but most merges (docs, admin UI, changesets) don't
  # touch conformance-relevant code — CHANGELOGs and .changeset/ churn is
  # excluded from the hash, so those force-pushes skip the ~15-minute run.
  precheck:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'changeset-release/main'
    runs-on: ubuntu-latest
    outputs:
      code-hash: ${{ steps.hash.outputs.hash }}
      already-passed: ${{ steps.marker.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Only local git commands run here — no credentialed operations.
          persist-credentials: false

      - name: Compute conformance code hash
        id: hash
        run: |
          hash=$(git ls-files -s -- packages apps/conformance-runner package.json pnpm-lock.yaml pnpm-workspace.yaml .github/workflows/conformance.yml ':!**/CHANGELOG.md' ':!.changeset' | git hash-object --stdin)
          echo "hash=$hash" >> "$GITHUB_OUTPUT"
          echo "conformance code hash: $hash"

      - name: Check for a prior passing run of this code
        id: marker
        uses: actions/cache/restore@v4
        with:
          path: .conformance-passed
          key: conformance-pass-v1-${{ steps.hash.outputs.hash }}
          lookup-only: true

  conformance:
    needs: precheck
    # Manual dispatches always run. pull_request runs skip when this exact
    # code state already passed a full run — the required check reports
    # "skipped", which satisfies branch protection the same way it does on
    # non-release PRs. (If precheck itself was skipped — non-release PR —
    # this job is skipped too via the needs chain.)
    if: github.event_name == 'workflow_dispatch' || needs.precheck.outputs.already-passed != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # By the time an approved run starts, its commit may no longer be the
      # head of changeset-release/main. Concurrency is per-SHA (see above),
      # so a stale run bails out here instead of burning ~15 minutes on a
      # commit whose result no longer matters.
      - name: Cancel superseded run
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.head_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          head=$(git ls-remote origin "refs/heads/$HEAD_REF" | cut -f1)
          if [ -n "$head" ] && [ "$head" != "$PR_HEAD_SHA" ]; then
            echo "$HEAD_REF is now at $head; this run is for $PR_HEAD_SHA — superseded, cancelling."
            gh run cancel "$GITHUB_RUN_ID" --repo "$GITHUB_REPOSITORY"
            sleep 60
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN }}

      # The auth-server is generated by create-authhero and consumes
      # workspace:* deps that need to be built first.
      # pnpm -r builds in topological dependency order, so each package's
      # dist/*.d.ts exist before dependents type-check against them. This also
      # builds create-authhero, whose compiled CLI the scaffold step below
      # runs (it writes into <cwd>/<projectName>, and `pnpm conformance:seed`
      # expects the result at apps/conformance-auth-server, so we run it from apps/).
      - name: Build workspace packages
        run: pnpm -r --filter './packages/**' build

      # Generate the auth-server fresh — it's gitignored. The --conformance
      # flag bakes in the test clients, conformance user, and tenant
      # default_audience that the OIDCC plan needs.
      - name: Generate auth-server
        working-directory: apps
        run: |
          node ../packages/create-authhero/dist/create-authhero.js \
            conformance-auth-server \
            --template local \
            --multi-tenant \
            --conformance \
            --conformance-alias my-local-test \
            --workspace \
            --skip-install \
            --skip-migrate \
            --skip-start \
            --yes

      - name: Wire generated auth-server into the workspace
        run: pnpm install --no-frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN }}

      - name: Migrate and seed auth-server
        run: pnpm conformance:seed

      # Clone the OIDF conformance suite. The compose files require a locally
      # built JAR (the suite doesn't publish a public Docker image), so we
      # cache ~/.m2 and the suite's target/ directory across runs.
      - name: Clone conformance suite
        run: |
          if [ ! -d ~/conformance-suite ]; then
            git clone --depth 1 https://gitlab.com/openid/conformance-suite.git ~/conformance-suite
          fi

      # The suite is cloned into ~/conformance-suite (outside $GITHUB_WORKSPACE),
      # so hashFiles can't see its pom.xml. Use a static version tag instead and
      # bump it manually when a fresh suite build is needed.
      - name: Cache conformance suite build
        id: suite-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/conformance-suite/target
            ~/.m2/repository
          key: conformance-suite-${{ runner.os }}-v1
          restore-keys: |
            conformance-suite-${{ runner.os }}-

      - name: Build conformance suite (cold cache)
        if: steps.suite-cache.outputs.cache-hit != 'true'
        run: |
          cd ~/conformance-suite
          MAVEN_CACHE=~/.m2 docker compose -f builder-compose.yml run --rm builder

      # Layer a CI-only override on top of the upstream dev-mac compose file so
      # the suite container gets host.docker.internal:host-gateway in its
      # /etc/hosts. Docker Desktop on Mac populates that name automatically;
      # Linux Docker doesn't, so without the override every discovery fetch
      # fails with "host.docker.internal: Name or service not known".
      - name: Start conformance suite
        working-directory: /home/runner/conformance-suite
        run: |
          docker compose \
            -f docker-compose-dev-mac.yml \
            -f "$GITHUB_WORKSPACE/apps/conformance-runner/docker-compose-ci-override.yml" \
            up -d

      # Playwright runs on the runner host (not inside Docker), so it needs
      # to resolve host.docker.internal — the issuer hostname the suite sends
      # the browser to — back to the local auth-server. Docker Desktop on Mac
      # adds this entry automatically; Ubuntu runners do not.
      - name: Map host.docker.internal to localhost on the runner
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      # Cache the Chromium download (~150 MB) keyed on the Playwright
      # version; on a hit only the apt system deps need installing.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(pnpm --filter @authhero/conformance-runner exec playwright --version | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @authhero/conformance-runner exec playwright install --with-deps chromium

      - name: Install Playwright system deps (browser cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @authhero/conformance-runner exec playwright install-deps chromium

      # SKIP_SETUP=1 because the steps above already started the suite and
      # seeded the DB; ALLOW_WARNING is configurable from the workflow input.
      # On pull_request runs there are no inputs — allow warnings (the
      # dispatch default) and run the full plan.
      - name: Run conformance runner
        env:
          SKIP_SETUP: "1"
          ALLOW_WARNING: ${{ (github.event_name == 'pull_request' || inputs.allow_warning) && '1' || '' }}
          GREP: ${{ inputs.grep }}
          PW_WORKERS: ${{ inputs.workers }}
        # No `--` before --grep: pnpm passes the separator through verbatim,
        # and `playwright test -- --grep x` treats everything after `--` as
        # file filters → "No tests found".
        run: |
          if [ -n "$GREP" ]; then
            pnpm conformance:run --grep "$GREP"
          else
            pnpm conformance:run
          fi

      # Only reached when the runner step passed. Grep-filtered dispatch runs
      # don't count as a full pass, so they don't write a marker.
      - name: Record passing code state
        if: needs.precheck.outputs.already-passed != 'true' && (github.event_name == 'pull_request' || inputs.grep == '')
        run: echo "passed as run ${{ github.run_id }}" > .conformance-passed

      - name: Save pass marker
        if: needs.precheck.outputs.already-passed != 'true' && (github.event_name == 'pull_request' || inputs.grep == '')
        uses: actions/cache/save@v4
        with:
          path: .conformance-passed
          key: conformance-pass-v1-${{ needs.precheck.outputs.code-hash }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/conformance-runner/playwright-report/
          retention-days: 14

      - name: Upload OIDF conformance plan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-reports
          path: apps/conformance-runner/conformance-reports/
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: apps/conformance-runner/test-results/
          retention-days: 14

      - name: Dump conformance suite logs on failure
        if: failure()
        run: |
          docker logs conformance-suite-server-1 --tail 500 2>&1 || true
          docker logs conformance-suite-nginx-1  --tail 200 2>&1 || true

      - name: Stop conformance suite
        if: always()
        run: pnpm conformance:stop || true
