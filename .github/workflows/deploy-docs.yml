name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - ".github/workflows/deploy-docs.yml"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Guard against workflow_dispatch from non-main refs publishing unmerged
    # docs to the production --branch=main Pages deployment.
    if: ${{ vars.CLOUDFLARE_ACCOUNT_ID != '' && github.ref == 'refs/heads/main' }}
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --filter @authhero/docs... --frozen-lockfile

      - name: Build docs
        run: pnpm --filter @authhero/docs build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 pages deploy apps/docs/.vitepress/dist --project-name=authhero-docs --branch=main
