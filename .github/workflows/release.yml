name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGE_READ_TOKEN }}

      # Restore TypeScript's incremental output (`.tsbuildinfo`) and the
      # `dist/types/` per-file `.d.ts` tree that `rollup-plugin-dts` bundles.
      # On a cache hit, `tsc -p tsconfig.types.json` skips type-checking and
      # re-emit for unchanged files, dropping authhero's cold build from
      # ~21 s to ~11 s. Cache must include both: tsbuildinfo alone gives no
      # speedup because tsc still re-emits when the `.d.ts` files are absent.
      - name: Restore TypeScript build cache
        uses: actions/cache@v4
        with:
          path: |
            packages/*/tsconfig.tsbuildinfo
            packages/authhero/dist/tsconfig.types.tsbuildinfo
            packages/authhero/dist/types
          key: ${{ runner.os }}-ts-${{ hashFiles('packages/*/tsconfig*.json', 'pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ts-${{ hashFiles('packages/*/tsconfig*.json', 'pnpm-lock.yaml') }}-
            ${{ runner.os }}-ts-

      - name: Build packages
        run: |
          pnpm interfaces build
          pnpm saml build
          pnpm proxy build
          pnpm kysely build
          pnpm drizzle build
          pnpm cloudflare build
          pnpm widget build
          pnpm authhero build
          pnpm multi-tenancy build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
